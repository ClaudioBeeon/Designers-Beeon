<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Clientes por Designer — Beeon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }

  .header { background: #fff; padding: 0.85rem 1.5rem; border-bottom: 1px solid #e0e0da; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .header h1 { font-size: 16px; font-weight: 600; color: #1a1a18; display: flex; align-items: center; gap: 8px; }
  .header h1 i { font-size: 18px; color: #378ADD; }
  .stats { font-size: 12px; color: #888; background: #f1efe8; padding: 4px 10px; border-radius: 20px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .sync-status { font-size: 11px; color: #3B6D11; background: #EAF3DE; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; transition: background 0.2s, color 0.2s; }
  .sync-status i { font-size: 12px; }
  .sync-status.saving { color: #854F0B; background: #FAEEDA; }
  .sync-status.error { color: #993556; background: #FBEAF0; }
  .col-horas-total { font-size: 11px; color: #888; background: #f1efe8; padding: 2px 7px; border-radius: 10px; display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
  .tempo-row { display: flex; align-items: center; gap: 6px; margin-top: 0; padding-top: 4px; border-top: 1px dashed #e8e6e0; }
  .tempo-label { font-size: 10px; color: #aaa; display: flex; align-items: center; gap: 3px; white-space: nowrap; }
  .tempo-ctrl { display: flex; align-items: center; gap: 4px; margin-left: auto; }
  .tempo-btn { background: #fafaf8; border: 1px solid #d3d1c7; border-radius: 5px; width: 20px; height: 20px; font-size: 13px; line-height: 1; cursor: pointer; color: #8c5a1a; display: flex; align-items: center; justify-content: center; padding: 0; transition: background 0.1s; flex-shrink: 0; }
  .tempo-btn:hover { background: #faeeda; border-color: #D4853A; }
  .tempo-val { font-size: 12px; font-weight: 700; color: #8c5a1a; min-width: 36px; text-align: center; cursor: pointer; }
  .tempo-unit { font-size: 10px; color: #aaa; margin-left: 1px; }
  .tempo-input { font-size: 12px; font-weight: 700; color: #8c5a1a; width: 42px; text-align: center; border: 1px solid #D4853A; border-radius: 5px; padding: 1px 4px; outline: none; font-family: inherit; background: #fdf3e8; }

  .toolbar { background: #fff; padding: 0.55rem 1.5rem; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #e0e0da; }
  .toolbar input[type=text] { font-size: 13px; padding: 6px 11px; border: 1px solid #d3d1c7; border-radius: 8px; background: #fafaf8; color: #1a1a18; width: 200px; outline: none; transition: border-color 0.15s; }
  .toolbar input[type=text]:focus { border-color: #378ADD; background: #fff; }
  .toolbar select { font-size: 13px; padding: 6px 9px; border: 1px solid #d3d1c7; border-radius: 8px; background: #fafaf8; color: #1a1a18; outline: none; cursor: pointer; }
  .toolbar label { font-size: 12px; color: #666; }
  .sep { width: 1px; height: 24px; background: #e0e0da; margin: 0 4px; }
  .sort-group { display: flex; align-items: center; gap: 6px; }
  .sort-btn { font-size: 12px; padding: 5px 10px; border: 1px solid #d3d1c7; border-radius: 8px; background: #fafaf8; color: #555; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: all 0.12s; font-family: inherit; }
  .sort-btn:hover { background: #f1efe8; }
  .sort-btn.active { background: #378ADD; color: #fff; border-color: #378ADD; }
  .btn { font-size: 12px; padding: 6px 13px; border: 1px solid #d3d1c7; border-radius: 8px; background: #fff; color: #1a1a18; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: background 0.12s; font-family: inherit; }
  .btn:hover:not(:disabled) { background: #f1efe8; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: #378ADD; color: #fff; border-color: #378ADD; }
  .btn-primary:hover { background: #2a6db5; }

  .board { display: flex; gap: 14px; padding: 1.25rem 1.5rem 5rem; overflow-x: auto; min-height: calc(100vh - 130px); align-items: flex-start; }

  .col { flex: 0 0 230px; display: flex; flex-direction: column; gap: 6px; transition: opacity 0.15s; }
  .col.col-dragging { opacity: 0.35; }
  .col.col-drag-over { outline: 2px dashed #378ADD; outline-offset: 4px; border-radius: 12px; }
  .col-drag-handle { cursor: grab; color: #ccc; font-size: 13px; padding: 2px 3px; flex-shrink: 0; transition: color 0.1s; }
  .col-drag-handle:hover { color: #888; }
  .col-drag-handle:active { cursor: grabbing; }
  .col-header { background: #fff; border-radius: 10px; padding: 8px 12px; border: 1px solid #e0e0da; display: flex; flex-direction: column; gap: 5px; }
  .col-header-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .col-name-input { font-size: 13px; font-weight: 600; color: #1a1a18; background: transparent; border: 1px solid transparent; outline: none; width: 100%; padding: 2px 4px; border-radius: 4px; font-family: inherit; transition: background 0.12s, border 0.12s; min-width: 0; }
  .col-name-input:focus { background: #f5f5f3; border-color: #d3d1c7; }
  .col-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .col-count { font-size: 11px; color: #888; white-space: nowrap; background: #f1efe8; padding: 2px 7px; border-radius: 10px; }
  .col-criativos-total { font-size: 11px; font-weight: 600; color: #185FA5; background: #E6F1FB; padding: 2px 7px; border-radius: 10px; white-space: nowrap; display: flex; align-items: center; gap: 3px; }

  .drop-zone { flex: 1; min-height: 80px; border-radius: 10px; border: 2px dashed #d3d1c7; padding: 5px; display: flex; flex-direction: column; gap: 5px; transition: border-color 0.15s, background 0.15s; }
  .drop-zone.drag-over { border-color: #378ADD; background: #EAF3FF; }

  .client-card { background: #fff; border: 1px solid #e0e0da; border-radius: 9px; padding: 9px 11px; cursor: grab; user-select: none; transition: box-shadow 0.12s, opacity 0.15s; }
  .client-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #c4c2b8; }
  .client-card:active { cursor: grabbing; }
  .client-card.dragging { opacity: 0.35; }
  .client-card.hidden { display: none; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; }
  .client-name-input { font-size: 12px; font-weight: 600; color: #1a1a18; background: transparent; border: 1px solid transparent; outline: none; width: 100%; padding: 2px 3px; cursor: grab; line-height: 1.4; resize: none; font-family: inherit; border-radius: 4px; transition: background 0.12s, border-color 0.12s; overflow: hidden; }
  .client-name-input:focus { cursor: text; background: #f5f5f3; border-color: #d3d1c7; }
  .edit-icon { font-size: 12px; color: #bbb; flex-shrink: 0; cursor: pointer; opacity: 0; transition: opacity 0.1s; padding: 2px; }
  .client-card:hover .edit-icon { opacity: 1; }
  .edit-icon:hover { color: #378ADD; }
  .card-actions { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }
  .card-icon-btn { font-size: 12px; color: #bbb; cursor: pointer; opacity: 0; transition: opacity 0.1s; padding: 2px 3px; background: none; border: none; line-height: 1; }
  .client-card:hover .card-icon-btn { opacity: 1; }
  .card-icon-btn:hover.duplicate { color: #378ADD; }
  .card-icon-btn:hover.remove { color: #c0392b; }

  .client-meta { display: flex; gap: 3px; margin-top: 5px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 5px; line-height: 1.5; display: inline-flex; align-items: center; gap: 3px; font-weight: 500; }
  .badge i { font-size: 10px; }
  .badge-atend { background: #E6F1FB; color: #185FA5; }
  .scope-inbound { background: #EAF3DE; color: #3B6D11; }
  .scope-performance { background: #E6F1FB; color: #185FA5; }
  .scope-seo { background: #FAEEDA; color: #854F0B; }
  .scope-rede { background: #FBEAF0; color: #993556; }
  .badge-video { background: #FAEEDA; color: #854F0B; }
  .badge-email { background: #FBEAF0; color: #993556; }

  .criativos-row { display: flex; align-items: center; gap: 6px; margin-top: 7px; padding-top: 6px; border-top: 1px solid #f0ede6; padding-bottom: 2px; }
  .criativos-label { font-size: 10px; color: #999; white-space: nowrap; }
  .criativos-ctrl { display: flex; align-items: center; gap: 4px; margin-left: auto; }
  .criativos-btn { width: 20px; height: 20px; border: 1px solid #d3d1c7; border-radius: 5px; background: #fafaf8; color: #555; cursor: pointer; font-size: 13px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: background 0.1s; padding: 0; font-family: inherit; flex-shrink: 0; }
  .criativos-btn:hover { background: #378ADD; color: #fff; border-color: #378ADD; }
  .criativos-val { font-size: 13px; font-weight: 700; color: #185FA5; min-width: 22px; text-align: center; }
  .criativos-input { font-size: 13px; font-weight: 700; color: #185FA5; width: 38px; text-align: center; border: 1px solid #378ADD; border-radius: 5px; padding: 1px 4px; outline: none; font-family: inherit; background: #E6F1FB; }
  .atend-input { font-size: 10px; font-weight: 500; color: #185FA5; border: 1px solid #378ADD; border-radius: 5px; padding: 2px 6px; outline: none; font-family: inherit; background: #E6F1FB; width: 100px; }

  /* Tags de serviços */
  .servicos-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding-top: 6px; border-top: 1px solid #f0ede6; align-items: center; }
  .servico-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; display: inline-flex; align-items: center; gap: 3px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; user-select: none; border: 1.5px solid transparent; }
  .servico-tag:hover { opacity: 0.8; }
  .servico-tag .tag-remove { font-size: 9px; margin-left: 2px; opacity: 0.6; }
  .servico-tag:hover .tag-remove { opacity: 1; }
  .add-servico-btn { font-size: 10px; color: #aaa; background: #f5f5f3; border: 1.5px dashed #d3d1c7; border-radius: 20px; padding: 2px 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; transition: border-color 0.15s, color 0.15s; }
  .add-servico-btn:hover { border-color: #378ADD; color: #378ADD; }

  /* Popup de seleção de tags */
  .tags-popup { position: absolute; background: #fff; border: 1px solid #d3d1c7; border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,0.14); padding: 10px; z-index: 500; min-width: 200px; }
  .tags-popup-title { font-size: 10px; color: #999; font-weight: 600; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tags-popup-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .tags-popup-option { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; cursor: pointer; border: 1.5px solid transparent; transition: opacity 0.1s, transform 0.1s; }
  .tags-popup-option:hover { transform: scale(1.05); }
  .tags-popup-option.active { opacity: 0.4; cursor: default; }
  .tags-popup-custom { display: flex; gap: 5px; margin-top: 4px; border-top: 1px solid #f0ede6; padding-top: 8px; }
  .tags-popup-custom input { flex: 1; font-size: 11px; padding: 4px 8px; border: 1px solid #d3d1c7; border-radius: 6px; outline: none; font-family: inherit; background: #fafaf8; }
  .tags-popup-custom input:focus { border-color: #378ADD; }
  .tags-popup-custom button { font-size: 11px; padding: 4px 10px; background: #378ADD; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(20,20,18,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal-overlay.hidden { display: none; }
  .modal-box { background: #fff; border-radius: 12px; padding: 20px 22px; width: 360px; max-width: 92vw; box-shadow: 0 12px 40px rgba(0,0,0,0.22); }
  .modal-box h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 7px; color: #1a1a18; }
  .modal-box h2 i { color: #378ADD; }
  .modal-field { margin-bottom: 11px; display: flex; flex-direction: column; gap: 4px; }
  .modal-field label { font-size: 11px; color: #666; font-weight: 600; }
  .modal-field input, .modal-field select { font-size: 13px; padding: 7px 10px; border: 1px solid #d3d1c7; border-radius: 8px; background: #fafaf8; color: #1a1a18; outline: none; font-family: inherit; }
  .modal-field input:focus, .modal-field select:focus { border-color: #378ADD; background: #fff; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  .footer { background: #fff; border-top: 1px solid #e0e0da; padding: 0.55rem 1.5rem; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; font-size: 11px; color: #888; position: fixed; bottom: 0; width: 100%; z-index: 100; }
  .legend-item { display: inline-flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .hint { margin-left: auto; font-style: italic; color: #aaa; }

  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-track { background: #f1efe8; }
  ::-webkit-scrollbar-thumb { background: #c4c2b8; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1><i class="ti ti-layout-columns"></i> Clientes por Designer — Beeon</h1>
  <div class="header-right">
    <span class="stats" id="stats-bar"></span>
    <span class="sync-status" id="sync-status"><i class="ti ti-cloud"></i> Carregando...</span>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Buscar cliente..." oninput="filterCards()">
  <label>Escopo:</label>
  <select id="filter-escopo" onchange="filterCards()">
    <option value="">Todos</option>
    <option value="INBOUND">Inbound</option>
    <option value="PERFORMANCE">Performance</option>
    <option value="SEO">SEO</option>
    <option value="REDE SOCIAL">Rede Social</option>
  </select>
  <div class="sep"></div>
  <div class="sort-group">
    <label>Ordenar:</label>
    <button class="sort-btn active" id="sort-default" onclick="setSort('default')"><i class="ti ti-layout-list"></i> Padrão</button>
    <button class="sort-btn" id="sort-alpha" onclick="setSort('alpha')"><i class="ti ti-sort-a-z"></i> A–Z</button>
    <button class="sort-btn" id="sort-atend" onclick="setSort('atend')"><i class="ti ti-user"></i> Atendimento</button>
    <button class="sort-btn" id="sort-criativos" onclick="setSort('criativos')"><i class="ti ti-stack"></i> Criativos</button>
  </div>
  <div class="sep"></div>
  <button class="btn" id="undo-btn" onclick="undo()" disabled><i class="ti ti-arrow-back-up"></i> Desfazer</button>
  <button class="btn btn-primary" onclick="openAddClientModal()"><i class="ti ti-user-plus"></i> Novo Cliente</button>
  <button class="btn btn-primary" onclick="openAddDesignerModal()"><i class="ti ti-layout-columns"></i> Novo Designer</button>
  <button class="btn btn-primary" onclick="exportData()"><i class="ti ti-download"></i> Exportar CSV</button>
</div>

<div class="board" id="board"></div>

<div class="footer">
  <span class="legend-item"><span class="legend-dot" style="background:#639922;"></span>Inbound</span>
  <span class="legend-item"><span class="legend-dot" style="background:#378ADD;"></span>Performance</span>
  <span class="legend-item"><span class="legend-dot" style="background:#BA7517;"></span>SEO</span>
  <span class="legend-item"><span class="legend-dot" style="background:#993556;"></span>Rede Social</span>
  <span class="hint"><i class="ti ti-pencil"></i> Clique no nome para editar &nbsp;·&nbsp; Arraste para mover &nbsp;·&nbsp; +/- para ajustar criativos</span>
</div>

<div class="modal-overlay hidden" id="add-client-modal">
  <div class="modal-box">
    <h2><i class="ti ti-user-plus"></i> Novo Cliente</h2>
    <div class="modal-field">
      <label>Nome do cliente</label>
      <input type="text" id="new-cliente-nome" placeholder="Ex: LOJA TAL">
    </div>
    <div class="modal-field">
      <label>Escopo</label>
      <select id="new-cliente-escopo">
        <option value="INBOUND">Inbound</option>
        <option value="PERFORMANCE" selected>Performance</option>
        <option value="SEO">SEO</option>
        <option value="REDE SOCIAL">Rede Social</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Atendimento</label>
      <input type="text" id="new-cliente-atend" list="atend-list" placeholder="Ex: Manu">
      <datalist id="atend-list"></datalist>
    </div>
    <div class="modal-field">
      <label>Designer</label>
      <select id="new-cliente-designer"></select>
    </div>
    <div class="modal-field">
      <label>Vídeo (opcional)</label>
      <input type="text" id="new-cliente-video" placeholder="Ex: Cláudio">
    </div>
    <div class="modal-field">
      <label>E-mail Design (opcional)</label>
      <input type="text" id="new-cliente-email" placeholder="Ex: Cláudio">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddClientModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitAddClient()"><i class="ti ti-check"></i> Adicionar</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="add-designer-modal">
  <div class="modal-box">
    <h2><i class="ti ti-layout-columns"></i> Novo Designer</h2>
    <div class="modal-field">
      <label>Nome do designer</label>
      <input type="text" id="new-designer-nome" placeholder="Ex: Fernanda">
    </div>
    <div class="modal-field">
      <label>Cor da coluna</label>
      <input type="color" id="new-designer-cor" value="#378ADD" style="height:36px;padding:2px 4px;cursor:pointer;">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddDesignerModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitAddDesigner()"><i class="ti ti-check"></i> Adicionar</button>
    </div>
  </div>
</div>

function onColDragStart(e) {
  dragCol = e.currentTarget;
  dragCol.dataset.colDragging = "1";
  setTimeout(() => dragCol && dragCol.classList.add("col-dragging"), 0);
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", dragCol.dataset.designer);
}

function onColDragEnd() {
  if (dragCol) { dragCol.classList.remove("col-dragging"); delete dragCol.dataset.colDragging; }
  document.querySelectorAll(".col").forEach(c => c.classList.remove("col-drag-over"));
  dragCol = null; dragColOver = null;
}

function onColDragOver(e) {
  if (!dragCol) return;
  e.preventDefault();
  const target = e.currentTarget;
  if (target === dragCol) return;
  if (dragColOver !== target) {
    document.querySelectorAll(".col").forEach(c => c.classList.remove("col-drag-over"));
    target.classList.add("col-drag-over");
    dragColOver = target;
  }
}

function onColDrop(e) {
  e.preventDefault();
  if (!dragCol || !dragColOver || dragCol === dragColOver) return;
  const fromD = dragCol.dataset.designer;
  const toD = dragColOver.dataset.designer;
  const fi = designers.indexOf(fromD);
  const ti = designers.indexOf(toD);
  if (fi === -1 || ti === -1) return;
  saveHistory();
  designers.splice(fi, 1);
  designers.splice(ti, 0, fromD);
  renderBoard();
  scheduleSave();
}

function getServicoStyle(label) {
  const pre = SERVICOS_PREDEFINIDOS.find(s => s.label.toLowerCase() === label.toLowerCase());
  if (pre) return { bg: pre.bg, color: pre.color, icon: pre.icon };
  // Cor gerada para tags customizadas
  let hash = 0;
  for (let i = 0; i < label.length; i++) hash = label.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  return { bg: `hsl(${hue},55%,92%)`, color: `hsl(${hue},45%,35%)`, icon: "ti-tag" };
}

      const customInput = popup.querySelector("#custom-tag-input");

        closeTagsPopup();

        scheduleSave();

      customInput.addEventListener("keydown", ev => {
        if (ev.key === "Enter") popup.querySelector("#custom-tag-add").click();

      // Posição do popup
      document.body.appendChild(popup);

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzzWtG4jkVpLvPwOAHaj-h9KK9k_8N6YWGUXfFtUDSXRiCj7ILDPvuSy9VJXhglTrzEQQ/exec";
let lastSyncedAt = 0;
let saveTimer = null;
let savePending = false;
let isApplyingRemote = false;

function setSyncStatus(mode) {
  const el = document.getElementById("sync-status");
  if (!el) return;
  el.classList.remove("saving", "error");
  if (mode === "saving") {
    el.classList.add("saving");
    el.innerHTML = '<i class="ti ti-cloud-upload"></i> Salvando...';
  } else if (mode === "error") {
    el.classList.add("error");
    el.innerHTML = '<i class="ti ti-cloud-off"></i> Erro ao salvar — tentando de novo';
  } else if (mode === "loading") {
    el.innerHTML = '<i class="ti ti-cloud"></i> Carregando...';
  } else {
    el.innerHTML = '<i class="ti ti-cloud-check"></i> Sincronizado';
  }
}

function buildPayload() {
  return { designers: designers, colors: designerColors, state: state };
}

function isUserEditing() {
  const el = document.activeElement;
  if (!el) return false;
  return el.tagName === "INPUT" || el.tagName === "TEXTAREA";
}

function applyRemoteData(data) {
  isApplyingRemote = true;
  if (data.designers) designers = data.designers;
  if (data.colors) Object.assign(designerColors, data.colors);
  if (data.state) state = data.state;
  designers.forEach(d => { if (!state[d]) state[d] = []; });
  isApplyingRemote = false;
}

async function loadFromSheet() {
  setSyncStatus("loading");
  try {
    const res = await fetch(WEBAPP_URL, { method: "GET" });
    const json = await res.json();
    if (json.ok && !json.empty && json.data) {
      applyRemoteData(json.data);
      lastSyncedAt = json.updatedAt || 0;
      setSyncStatus("idle");
    } else {
      // Planilha ainda vazia: usa os dados padrão e grava na planilha
      initState();
      await doSave();
    }
  } catch (err) {
    console.error("Falha ao carregar do Google Sheets:", err);
    initState();
    setSyncStatus("error");
  }
}

function scheduleSave() {
  if (isApplyingRemote) return;
  setSyncStatus("saving");
  savePending = true;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 900);
}

async function doSave() {
  savePending = false;
  const payload = buildPayload();
  try {
    const res = await fetch(WEBAPP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ data: payload })
    });
    const json = await res.json();
    if (json.ok) {
      lastSyncedAt = json.updatedAt || Date.now();
      setSyncStatus("idle");
    } else {
      throw new Error(json.error || "erro desconhecido");
    }
  } catch (err) {
    console.error("Falha ao salvar no Google Sheets:", err);
    setSyncStatus("error");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(doSave, 4000);
  }
}

async function pollForUpdates() {
  if (savePending || isUserEditing()) return;
  try {
    const res = await fetch(WEBAPP_URL, { method: "GET" });
    const json = await res.json();
    if (json.ok && !json.empty && json.updatedAt && json.updatedAt > lastSyncedAt) {
      applyRemoteData(json.data);
      lastSyncedAt = json.updatedAt;
      renderBoard();
      setSyncStatus("idle");
    }
  } catch (err) {
    console.error("Falha ao verificar atualizações:", err);
  }
}

function getColor(d) { return designerColors[d] || "#888780"; }

function getSortedClients(clients) {
  const arr = [...clients];
  if (currentSort === "alpha") arr.sort((a,b) => a.cliente.localeCompare(b.cliente, "pt"));
  else if (currentSort === "atend") arr.sort((a,b) => a.atend.localeCompare(b.atend, "pt") || a.cliente.localeCompare(b.cliente, "pt"));
  else if (currentSort === "criativos") arr.sort((a,b) => (b.criativos||0) - (a.criativos||0));
  return arr;
}

function setSort(mode) {
  currentSort = mode;
  document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("sort-" + mode).classList.add("active");
  renderBoard();
}

function totalCriativos(designer) {
  return (state[designer] || []).reduce((s, c) => s + (c.criativos || 0), 0);
}

function totalTempoMin(designer) {
  return (state[designer] || []).reduce((s, c) => s + (c.tempo || 0), 0);
}

function formatTempo(minutos) {
  if (!minutos) return "0min";
  if (minutos < 60) return minutos + "min";
  const h = Math.floor(minutos / 60);
  const m = minutos % 60;
  return m > 0 ? h + "h " + m + "min" : h + "h";
}

}

        inp.type = "text";
        inp.className = "atend-input";
        inp.value = c.atend;
        atendBadge.replaceWith(inp);
        inp.focus();
        inp.select();
        const commitAtend = () => {
          const v = inp.value.trim() || c.atend;
          if (v !== c.atend) saveHistory();
          c.atend = v;
          card.dataset.atend = v;
          atendBadge.innerHTML = atendIconHTML + v;
          inp.replaceWith(atendBadge);
          scheduleSave();
        };
        inp.addEventListener("blur", commitAtend);
        inp.addEventListener("keydown", ev => {
          if (ev.key === "Enter") inp.blur();
          if (ev.key === "Escape") { inp.value = c.atend; inp.blur(); }
          ev.stopPropagation();
        });
      });
      meta.appendChild(atendBadge);

      const scopeBadge = document.createElement("span");
      scopeBadge.className = "badge " + scopeClass(c.escopo);
      scopeBadge.textContent = c.escopo;
      meta.appendChild(scopeBadge);

      if (c.video && c.video !== "-") {
        const videoBadge = document.createElement("span");
        videoBadge.className = "badge badge-video";
        videoBadge.innerHTML = '<i class="ti ti-video"></i>' + c.video;
        meta.appendChild(videoBadge);
      }
      if (c.email && c.email !== "-") {
        const emailBadge = document.createElement("span");
        emailBadge.className = "badge badge-email";
        emailBadge.innerHTML = '<i class="ti ti-mail"></i>' + c.email;
        meta.appendChild(emailBadge);
      }

      // Serviços (tags interativas)
      const servicosRow = buildServicosRow(c, designer);

      // Criativos row
      const criRow = document.createElement("div");
      criRow.className = "criativos-row";
      criRow.innerHTML = '<span class="criativos-label"><i class="ti ti-stack" style="font-size:10px;vertical-align:-1px;"></i> Criativos</span>';

      const ctrl = document.createElement("div");
      ctrl.className = "criativos-ctrl";

      const btnMinus = document.createElement("button");
      btnMinus.className = "criativos-btn";
      btnMinus.textContent = "−";
      btnMinus.title = "Diminuir";

      const valSpan = document.createElement("span");
      valSpan.className = "criativos-val";
      valSpan.textContent = c.criativos || 0;
      valSpan.title = "Clique para editar diretamente";
      valSpan.style.cursor = "pointer";

      const btnPlus = document.createElement("button");
      btnPlus.className = "criativos-btn";
      btnPlus.textContent = "+";
      btnPlus.title = "Aumentar";

      // Click on value → inline input
      valSpan.addEventListener("click", () => {
        const inp = document.createElement("input");
        inp.type = "number";
        inp.className = "criativos-input";
        inp.value = c.criativos || 0;
        inp.min = 0;
        valSpan.replaceWith(inp);
        inp.focus();
        inp.select();
        const commit = () => {
          const v = Math.max(0, parseInt(inp.value) || 0);
          saveHistory();
          c.criativos = v;
          updateTotals(designer);
          inp.replaceWith(valSpan);
          valSpan.textContent = v;
          if (currentSort === "criativos") renderBoard();
          scheduleSave();
        };
        inp.addEventListener("blur", commit);
        inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); e.stopPropagation(); });
      });

      btnMinus.addEventListener("click", e => {
        e.stopPropagation();
        if ((c.criativos || 0) <= 0) return;
        saveHistory();
        c.criativos = (c.criativos || 0) - 1;
        valSpan.textContent = c.criativos;
        updateTotals(designer);
        if (currentSort === "criativos") renderBoard();
        scheduleSave();
      });
      btnPlus.addEventListener("click", e => {
        e.stopPropagation();
        saveHistory();
        c.criativos = (c.criativos || 0) + 1;
        valSpan.textContent = c.criativos;
        updateTotals(designer);
        if (currentSort === "criativos") renderBoard();
        scheduleSave();
      });

      ctrl.appendChild(btnMinus);
      ctrl.appendChild(valSpan);
      ctrl.appendChild(btnPlus);
      criRow.appendChild(ctrl);

      // Tempo row
      const tempoRow = document.createElement("div");
      tempoRow.className = "tempo-row";
      tempoRow.innerHTML = '<span class="tempo-label"><i class="ti ti-clock" style="font-size:10px;vertical-align:-1px;"></i> Tempo médio</span>';

      const tempoCtrl = document.createElement("div");
      tempoCtrl.className = "tempo-ctrl";

      const tMinus = document.createElement("button");
      tMinus.className = "tempo-btn";
      tMinus.textContent = "−";
      tMinus.title = "−5 min";

      const tVal = document.createElement("span");
      tVal.className = "tempo-val";
      tVal.title = "Clique para editar (em minutos)";
      tVal.textContent = formatTempo(c.tempo || 0);

      const tUnit = document.createElement("span");
      tUnit.className = "tempo-unit";
      tUnit.textContent = "";

      const tPlus = document.createElement("button");
      tPlus.className = "tempo-btn";
      tPlus.textContent = "+";
      tPlus.title = "+5 min";

      tVal.addEventListener("click", () => {
        const inp = document.createElement("input");
        inp.type = "number";
        inp.className = "tempo-input";
        inp.value = c.tempo || 0;
        inp.min = 0;
        inp.placeholder = "min";
        inp.title = "Digite o valor em minutos";
        tVal.replaceWith(inp);
        inp.focus(); inp.select();
        const commit = () => {
          const v = Math.max(0, parseInt(inp.value) || 0);
          saveHistory();
          c.tempo = v;
          tVal.textContent = formatTempo(v);
          inp.replaceWith(tVal);
          updateTempoTotals(designer);
          scheduleSave();
        };
        inp.addEventListener("blur", commit);
        inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); e.stopPropagation(); });
      });

      tMinus.addEventListener("click", e => {
        e.stopPropagation();
        if ((c.tempo || 0) < 5) return;
        saveHistory();
        c.tempo = (c.tempo || 0) - 5;
        tVal.textContent = formatTempo(c.tempo);
        updateTempoTotals(designer);
        scheduleSave();
      });

      tPlus.addEventListener("click", e => {
        e.stopPropagation();
        saveHistory();
        c.tempo = (c.tempo || 0) + 5;
        tVal.textContent = formatTempo(c.tempo);
        updateTempoTotals(designer);
        scheduleSave();
      });

      tempoCtrl.appendChild(tMinus);
      tempoCtrl.appendChild(tVal);
      tempoCtrl.appendChild(tPlus);
      tempoRow.appendChild(tempoCtrl);

      card.appendChild(cardTop);
      card.appendChild(meta);
      card.appendChild(servicosRow);
      card.appendChild(criRow);
      card.appendChild(tempoRow);

      card.addEventListener("dragstart", onDragStart);
      card.addEventListener("dragend", onDragEnd);
      zone.appendChild(card);
    });

    col.appendChild(zone);
    board.appendChild(col);
  });

  document.getElementById("stats-bar").textContent =
    totalClientes + " clientes · " + designers.length + " designers · " + totalCriat + " criativos no total";
  filterCards();
}

function updateTotals(designer) {
  const tc = totalCriativos(designer);
  const el = document.getElementById("criat-total-" + designer);
  if (el) el.innerHTML = '<i class="ti ti-stack" style="font-size:11px;"></i>' + tc;
  updateTempoTotals(designer);
  let totalCriat = 0;
  designers.forEach(d => totalCriat += totalCriativos(d));
  const clients = designers.reduce((s, d) => s + (state[d] || []).length, 0);
  document.getElementById("stats-bar").textContent =
    clients + " clientes · " + designers.length + " designers · " + totalCriat + " criativos no total";
}

function onDragStart(e) {
  dragCard = e.currentTarget;
  dragFrom = dragCard.dataset.designer;
  setTimeout(() => dragCard && dragCard.classList.add("dragging"), 0);
  e.dataTransfer.effectAllowed = "move";
}
function onDragEnd() {
  if (dragCard) dragCard.classList.remove("dragging");
  document.querySelectorAll(".drop-zone").forEach(z => z.classList.remove("drag-over"));
  dragCard = null; dragFrom = null;
}
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
function onDragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
function onDrop(e) {
  e.preventDefault();
  const zone = e.currentTarget;
  zone.classList.remove("drag-over");
  const toDesigner = zone.dataset.designer;
  if (!dragCard || dragFrom === toDesigner) return;
  const clienteName = dragCard.dataset.cliente;
  saveHistory();
  const fromArr = state[dragFrom];
  const idx = fromArr.findIndex(c => c.cliente === clienteName);
  if (idx > -1) {
    const [item] = fromArr.splice(idx, 1);
    item.designer = toDesigner;
    state[toDesigner].push(item);
  }
  renderBoard();
  scheduleSave();
}

function filterCards() {
  const q = document.getElementById("search").value.toLowerCase();
  const escopo = document.getElementById("filter-escopo").value;
  document.querySelectorAll(".client-card").forEach(card => {
    const matchQ = !q || card.dataset.cliente.toLowerCase().includes(q);
    const matchE = !escopo || card.dataset.escopo === escopo;
    card.classList.toggle("hidden", !(matchQ && matchE));
  });
  designers.forEach(d => {
    const zone = document.querySelector('.drop-zone[data-designer="' + d + '"]');
    if (!zone) return;
    const visible = zone.querySelectorAll(".client-card:not(.hidden)").length;
    const el = document.getElementById("count-" + d);
    if (el) el.textContent = visible + " cl." + (q || escopo ? "*" : "");
  });
}

function undo() {
  if (!history.length) return;
  const prev = history.pop();
  state = prev.state;
  designers = prev.designers;
  if (!history.length) document.getElementById("undo-btn").disabled = true;
  renderBoard();
  scheduleSave();
}

function exportData() {
  let lines = ["Designer,Cliente,Escopo,Atendimento,Vídeo,E-mail Design,Criativos,Tempo Médio (min)"];
  designers.forEach(d => {
    (state[d] || []).forEach(c => {
      lines.push('"'+d+'","'+c.cliente+'","'+c.escopo+'","'+c.atend+'","'+c.video+'","'+c.email+'",'+(c.criativos||0)+','+(c.tempo||0));
    });
  });
  lines.push("");
  lines.push("Totais por designer");
  designers.forEach(d => {
    lines.push('"'+d+'",,,,,,'+totalCriativos(d)+','+totalTempoMin(d));
  });
  const blob = new Blob([lines.join("\n")], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "clientes-por-designer.csv";
  a.click();
}

// ===== Modal: Novo Cliente =====
function openAddClientModal() {
  document.getElementById("new-cliente-nome").value = "";
  document.getElementById("new-cliente-escopo").value = "PERFORMANCE";
  document.getElementById("new-cliente-atend").value = "";
  document.getElementById("new-cliente-video").value = "";
  document.getElementById("new-cliente-email").value = "";

  const designerSelect = document.getElementById("new-cliente-designer");
  designerSelect.innerHTML = designers.map(d => '<option value="' + d + '">' + d + '</option>').join("");

  const atendSet = new Set();
  designers.forEach(d => (state[d] || []).forEach(c => { if (c.atend) atendSet.add(c.atend); }));
  document.getElementById("atend-list").innerHTML = [...atendSet].map(a => '<option value="' + a + '"></option>').join("");

  document.getElementById("add-client-modal").classList.remove("hidden");
  document.getElementById("new-cliente-nome").focus();
}

function closeAddClientModal() {
  document.getElementById("add-client-modal").classList.add("hidden");
}

function submitAddClient() {
  const nome = document.getElementById("new-cliente-nome").value.trim();
  if (!nome) { alert("Digite o nome do cliente."); return; }

  const jaExiste = designers.some(d => (state[d] || []).some(c => c.cliente.toLowerCase() === nome.toLowerCase()));
  if (jaExiste) { alert("Já existe um cliente com esse nome."); return; }

  const escopo = document.getElementById("new-cliente-escopo").value;
  const atend = document.getElementById("new-cliente-atend").value.trim() || "Sem atendimento";
  const designer = document.getElementById("new-cliente-designer").value;
  const video = document.getElementById("new-cliente-video").value.trim() || "-";
  const email = document.getElementById("new-cliente-email").value.trim() || "-";

  saveHistory();
  if (!state[designer]) state[designer] = [];
  state[designer].push({ cliente: nome, escopo: escopo, atend: atend, designer: designer, video: video, email: email, criativos: 0 });

  closeAddClientModal();
  renderBoard();
  scheduleSave();
}

document.getElementById("add-client-modal").addEventListener("click", e => {
  if (e.target.id === "add-client-modal") closeAddClientModal();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && !document.getElementById("add-client-modal").classList.contains("hidden")) {
    closeAddClientModal();
  }
});
// ===== Fim do modal =====

document.addEventListener("click", e => {
  if (activeTagsPopup && !activeTagsPopup.contains(e.target)) closeTagsPopup();
});

// ===== Modal: Novo Designer =====
function openAddDesignerModal() {
  document.getElementById("new-designer-nome").value = "";
  document.getElementById("new-designer-cor").value = "#378ADD";
  document.getElementById("add-designer-modal").classList.remove("hidden");
  document.getElementById("new-designer-nome").focus();
}

function closeAddDesignerModal() {
  document.getElementById("add-designer-modal").classList.add("hidden");
}

function submitAddDesigner() {
  const nome = document.getElementById("new-designer-nome").value.trim();
  if (!nome) { alert("Digite o nome do designer."); return; }
  if (designers.includes(nome)) { alert("Já existe um designer com esse nome."); return; }
  const cor = document.getElementById("new-designer-cor").value;
  saveHistory();
  designers.push(nome);
  state[nome] = [];
  designerColors[nome] = cor;
  closeAddDesignerModal();
  renderBoard();
  scheduleSave();
}

document.getElementById("add-designer-modal").addEventListener("click", e => {
  if (e.target.id === "add-designer-modal") closeAddDesignerModal();
});
// ===== Fim modal Novo Designer =====

(async function start() {
  await loadFromSheet();
  renderBoard();
  setInterval(pollForUpdates, 6000);
})();
